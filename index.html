<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>WebRTC 轨迹采集终端</title>
</head>
<body>
    <label for="scenarioSelect">当前模拟的网络场景: </label>
    <select id="scenarioSelect" style="padding: 5px;">
        <option value="baseline">Baseline (无限制)</option>
        <option value="fluctuating">Fluctuating (包含时序波动的终极训练集)</option>
        <option value="very_bad">Very Bad Network (极弱复合网-低带宽/大延迟/高丢包)</option>
        <option value="lte">LTE (常见移动网-高带宽/高抖动)</option>
        <option value="dsl">DSL (上下行严重不对称)</option>
        <option value="3g">3G (老旧移动网)</option>
        <option value="low_bw">LowBandwidth (纯低带宽测试)</option>
        <option value="high_loss">HighLoss (纯高丢包测试)</option>
        <option value="high_delay">HighDelay (纯高延迟测试)</option>
    </select>
    <br><br>
    
    <button id="startBtn">开启高熵模拟视频流</button>
    <button id="callBtn" disabled>建立连接并开始采集</button>
    <br><br>
    <video id="localVideo" autoplay muted playsinline style="width: 300px; border: 1px solid black;"></video>
    <video id="remoteVideo" autoplay playsinline style="width: 300px; border: 1px solid black;"></video>

    <script src="/socket.io/socket.io.js"></script>
    <script src="main.js"></script>
</body>
</html>
